{% extends "layouts/base.html" %}

{% block title %}
  {{ error_title }}
{% endblock %}

{% block stylesheets %}{% endblock %}

{% block content %}
  <main class="main-content position-relative border-radius-lg">
    <div class="container-fluid py-4">
      <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8">
          <div class="card shadow-lg trini-animate">
            <div class="card-body p-5 text-center">
              <h1 class="font-weight-bold mb-2">{{ error_title }}</h1>
              {% if error_message %}
                <p class="text-muted mb-4">{{ error_message }}</p>
              {% endif %}
              <a class="btn bg-gradient-{{ variables["meta"]["color"] }} trini-invite-btn" href="{{ url_for("base_blueprint.index") }}">{{ _("Back to Home") }}</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
{% endblock %}

{% block javascripts %}{% endblock %}
